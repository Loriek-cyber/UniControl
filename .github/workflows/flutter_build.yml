name: Flutter Multi-platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms android .
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/UniControl.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/UniControl.apk

  build-ios:
    name: Build iOS / iPadOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms ios .
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      # Package the unsigned .app into an .ipa (Payload folder structure)
      # iPadOS uses the same iOS build — it runs natively on iPad via the same artifact.
      - name: Create IPA from unsigned build
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r UniControl.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: UniControl.ipa

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms windows .
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms linux .
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION+$BUILD" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Rename and package artifacts for release
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Rename APK
          mv release-artifacts/android-release/UniControl.apk release-artifacts/UniControl-${VERSION}.apk

          # Rename IPA
          mv release-artifacts/ios-release/UniControl.ipa release-artifacts/UniControl-${VERSION}.ipa

          # Zip Windows artifacts
          cd release-artifacts/windows-release
          zip -r ../UniControl-${VERSION}-windows.zip .
          cd ../..

          # Zip Linux artifacts
          cd release-artifacts/linux-release
          zip -r ../UniControl-${VERSION}-linux.zip .
          cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: UniControl ${{ steps.version.outputs.version }}
          body: |
            ## UniControl ${{ steps.version.outputs.version }}

            ### Downloads
            | Piattaforma | File | Note |
            |---|---|---|
            | **Android** | `UniControl-${{ steps.version.outputs.version }}.apk` | Installabile direttamente |
            | **iOS / iPadOS** | `UniControl-${{ steps.version.outputs.version }}.ipa` | Unsigned — richiede re-signing per installazione |
            | **Windows** | `UniControl-${{ steps.version.outputs.version }}-windows.zip` | Eseguibile portabile |
            | **Linux** | `UniControl-${{ steps.version.outputs.version }}-linux.zip` | Release bundle |

            ---
            *Release automatica dal commit ${{ github.sha }}*
          draft: false
          prerelease: false
          files: |
            release-artifacts/UniControl-${{ steps.version.outputs.version }}.apk
            release-artifacts/UniControl-${{ steps.version.outputs.version }}.ipa
            release-artifacts/UniControl-${{ steps.version.outputs.version }}-windows.zip
            release-artifacts/UniControl-${{ steps.version.outputs.version }}-linux.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
