name: Flutter Multi-platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms android .
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS / iPadOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms ios .
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      # Note: For IPA and App Store submission, you need provisioning profiles and certificates setup.
      # iPadOS uses the same iOS build — it runs natively on iPad via the same artifact.
      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms windows .
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms linux .
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION+$BUILD" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Package artifacts for release
        run: |
          cd release-artifacts

          # Zip Android artifacts
          cd android-release
          zip -r ../UniControl-${{ steps.version.outputs.version }}-android.zip .
          cd ..

          # Zip iOS artifacts
          cd ios-release
          zip -r ../UniControl-${{ steps.version.outputs.version }}-ios.zip .
          cd ..

          # Zip Windows artifacts
          cd windows-release
          zip -r ../UniControl-${{ steps.version.outputs.version }}-windows.zip .
          cd ..

          # Zip Linux artifacts
          cd linux-release
          zip -r ../UniControl-${{ steps.version.outputs.version }}-linux.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: UniControl ${{ steps.version.outputs.version }}
          body: |
            ## UniControl ${{ steps.version.outputs.version }}

            ### Downloads
            - **Android** — APK + AAB (App Bundle)
            - **iOS / iPadOS** — Unsigned build (requires code signing for distribution)
            - **Windows** — Portable executable
            - **Linux** — Release bundle

            ---
            *Automated release from commit ${{ github.sha }}*
          draft: false
          prerelease: false
          files: |
            release-artifacts/UniControl-${{ steps.version.outputs.version }}-android.zip
            release-artifacts/UniControl-${{ steps.version.outputs.version }}-ios.zip
            release-artifacts/UniControl-${{ steps.version.outputs.version }}-windows.zip
            release-artifacts/UniControl-${{ steps.version.outputs.version }}-linux.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
