name: Flutter Multi-platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms android .
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS / iPadOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms ios .
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      # Note: For IPA and App Store submission, you need provisioning profiles and certificates setup.
      # iPadOS uses the same iOS build — it runs natively on iPad via the same artifact.
      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms windows .
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Generate platform scaffolding
        run: flutter create --org com.unicontrol --project-name uni_control --platforms linux .
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle
